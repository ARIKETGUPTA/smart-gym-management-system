<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./css/style.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="sidebar">

        <h2>🏋 Smart Gym</h2>
        <p id="today"></p>
        <ul>

            <li>Dashboard</li>
           <li> <a href="/attendance-page">Attendance</a> </li>
            <li>Subscription</li>
            <li>Profile</li>

            <li onclick="logout()">
                Logout
            </li>

        </ul>

    </div>

    <div class="main">

        <div class="profile-card">

           <h2>Welcome Back, <span id="name"></span> 👋</h2>
           <p id="email"></p>

        </div>

        <div class="cards">

            <div class="card">
                <h3>Membership</h3>
                <p id="membership"></p>
            </div>

            <div class="card">
                <h3>Days Remaining</h3>
                <p id="days"></p>
            </div>

            <div class="card">
                <h3>Payment Status</h3>
                <p id="payment"></p>
            </div>

            <div class="card">
                <h3>Attendance Count</h3>
                <p id="attendance"></p>
            </div>

        </div>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
