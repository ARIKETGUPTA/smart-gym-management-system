<!DOCTYPE html>
<html>

<head>

    <title>Payments</title>

    <link rel="stylesheet" href="css/payment.css">

</head>

<body>

<div class="container">

    <div class="sidebar">

        <h2>🏋 Smart Gym</h2>

        <ul>

            <li onclick="goToDashboard()">Dashboard</li>

            <li onclick="goToAttendance()">Attendance</li>

            <li onclick="goToSubscription()">Subscription</li>

            <li onclick="goToPayment()">Payments</li>

            <li onclick="goToProfile()">Profile</li>

            <li onclick="logout()">Logout</li>

        </ul>

    </div>

    <div class="main">

        <div class="payment-hero">

            <h1>💳 Payment Center</h1>

            <p>
                Manage membership payments and payment history
            </p>

        </div>

        <div class="payment-grid">

            <div class="payment-form-card">

                <h2>Create Payment</h2>

                <input type="number" id="amount" placeholder="Enter Amount">

                <select id="paymentMethod">

                    <option value="UPI">
                        UPI
                    </option>

                    <option value="Cash">
                        Cash
                    </option>

                    <option value="Card">
                        Card
                    </option>

                </select>

                <button onclick="makePayment()">

                    Record Payment

                </button>

            </div>

            <div class="payment-summary-card">

                <h2>Total Paid</h2>

                <div class="payment-total">

                    ₹<span id="totalPaid">

                        0

                    </span>

                </div>

                <p>
                    Lifetime Membership Payments
                </p>

            </div>

        </div>

        <div class="payment-history-card">

            <h2>Payment History</h2>

            <table>

                <thead>

                    <tr>

                        <th>Amount</th>

                        <th>Method</th>

                        <th>Status</th>

                        <th>Date</th>

                        <th>Gateway</th>

                        <th>Transaction ID</th>

                    </tr>

                </thead>

                <tbody id="paymentTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="js/payment.js"></script>

</body>
</html>
