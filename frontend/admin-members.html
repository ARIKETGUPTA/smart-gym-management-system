<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Members</title>

<link rel="stylesheet" href="css/admin-member.css">


</head>

<body>

<div class="container">


<div class="sidebar">

    <h2>🏋 Smart Gym Admin</h2>

    <ul>

        <li onclick="goToDashboard()">
            📊 Dashboard
        </li>

        <li onclick="goToMembers()">
            👥 Members
        </li>

        <li onclick="logout()">
            🚪 Logout
        </li>

    </ul>

</div>

<div class="main">

    <div class="header">

        <h1>👥 Gym Members</h1>

        <p>
            Manage all gym members from one place
        </p>

    </div>

    <div class="search-box">

        <input
        type="text"
        id="search"
        placeholder="Search Member">

        <button
        onclick="searchMembers()">

            Search

        </button>

    </div>

    <div class="table-card">

        <table>

            <thead>

                <tr>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Role</th>

                    <th>Membership</th>

                    <th>Payment</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="membersTable">

            </tbody>

        </table>

    </div>

</div>
```

</div>

<!-- Member Details Modal -->

<div id="memberModal" class="modal">

```
<div class="modal-content">

    <span
    class="close"
    onclick="closeModal()">

        &times;

    </span>

    <h2>Member Details</h2>

    <p>
        <strong>Name:</strong>
        <span id="modalName"></span>
    </p>

    <p>
        <strong>Email:</strong>
        <span id="modalEmail"></span>
    </p>

    <p>
        <strong>Role:</strong>
        <span id="modalRole"></span>
    </p>

    <p>
    <strong>Attendance Count:</strong>
        <span id="modalAttendance">0</span>
    </p>

    <p>
        <strong>Subscription Status:</strong>
        <span id="modalSubscriptionStatus">Active</span>
    </p>

    <p>
        <strong>Plan</strong>
    </p>

    <select id="modalPlan">

        <option value="Monthly">
            Monthly
        </option>

        <option value="Quarterly">
            Quarterly
        </option>

        <option value="Yearly">
            Yearly
        </option>

    </select>

    <br><br>

    <p>
        <strong>Payment Status</strong>
    </p>

    <select id="modalPayment">

        <option value="Paid">
            Paid
        </option>

        <option value="Pending">
            Pending
        </option>

    </select>

    <br><br>

    <button
    onclick="updateMemberDetails()">

        Save Changes

    </button>

</div>
```

</div>

<script src="js/admin-members.js"></script>

</body>

</html>
