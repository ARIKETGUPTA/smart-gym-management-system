<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    
<div class="container">

    <div class="sidebar">

        <h2>🏋 Smart Gym</h2>

        <ul>
            <li>Dashboard</li>
            <li>Members</li>
        </ul>

    </div>

    <div class="main">

        <h1>Gym Members</h1>
        <input type="text" id="search" placeholder="Search Member">
        <button onclick="searchMembers()">Search</button>
        <br><br>
        <table>

            <thead>

                <tr>

                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>MembershipType</th>
                    <th>PaymentStatus</th>
                    <th>Control</th>
                </tr>

            </thead>

            <tbody id="membersTable">

            </tbody>

        </table>

    </div>

</div>


<script src="js/admin-members.js"></script>

</body>
</html>
