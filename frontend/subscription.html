<!DOCTYPE html>
<html>
<head>
    <title>Subscription</title>
    <link rel="stylesheet" href="css/subscription.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>🏋 Smart Gym</h2>
        <p id="today"></p>
        <ul>

           <li onclick="goToDashboard()">Dashboard</li>   
           <li onclick="goToAttendance()">Attendance</li>
           <li onclick="goToSubscription()"> Subscription </li>
           <li onclick="goToPayment()">Payments</li>
           <li onclick="goToProfile()">Profile</li>

            <li onclick="logout()">
                Logout
            </li>

        </ul>
    </div>

    <div class="main">

    <div class="subscription-hero">

        <h1>💳 Membership Subscription</h1>

        <p>
            Manage your gym membership and payment status
        </p>

    </div>

    <div class="subscription-grid">

        <div class="subscription-card">

            <div class="plan-icon">
                🏋️
            </div>

            <h2 id="plan">
                Monthly
            </h2>

            <p class="plan-price">

                ₹<span id="price"></span>

            </p>

            <span id="status" class="status-badge">

                Active

            </span>

        </div>

        <div class="subscription-details">

            <h2>Membership Details</h2>

            <div class="detail-row">

                <span>💳 Payment Status</span>

                <strong id="payment"></strong>

            </div>

            <div class="detail-row">

                <span>⏳ Days Remaining</span>

                <strong id="days"></strong>

            </div>

            <div class="detail-row">

                <span>📅 Current Plan</span>

                <strong id="planName"></strong>

            </div>

        </div>

    </div>
    <div class="subscription-progress">

    <h2>📈 Membership Progress</h2>

    <div class="progress-bar">

        <div
        id="progressFill"
        class="progress-fill">

        </div>

    </div>

    <p id="progressText">

        0% Used

    </p>

    <button onclick="buyPlan('Monthly')">
    Buy Monthly ₹999
</button>

<button onclick="buyPlan('Quarterly')">
    Buy Quarterly ₹2499
</button>

<button onclick="buyPlan('Yearly')">
    Buy Yearly ₹8999
</button>

</div>
    <div id="reminder" class="reminder-card" style="display:none"> </div>

</div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="js/subscription.js"></script>

</body>
</html>
