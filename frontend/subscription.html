<!DOCTYPE html>
<html>
<head>
    <title>Subscription</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>🏋 Smart Gym</h2>
        <p id="today"></p>
        <ul>

           <li onclick="goToDashboard()">Dashboard</li>   
           <li onclick="goToAttendance()">Attendance</li>
           <li onclick="goToSubscription()"> Subscription </li>
           <li onclick="goToProfile()">Profile</li>

            <li onclick="logout()">
                Logout
            </li>

        </ul>
    </div>

    <div class="main">

        <div class="card">

            <h2>Subscription Details</h2>

            <p>Plan: <span id="plan"></span></p>
            <p>Price: ₹<span id="price"></span></p>
            <p>Status: <span id="status"></span></p>
            <p>Payment: <span id="payment"></span></p>
            <p>Days Left: <span id="days"></span></p>

        </div>

        <div
        id="reminder"
        class="card"
        style="display:none">

        </div>

    </div>

</div>

<script src="js/subscription.js"></script>

</body>
</html>
