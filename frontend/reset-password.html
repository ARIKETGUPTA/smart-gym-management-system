<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"  content="width=device-width, initial-scale=1.0">

    <title>Reset Password</title>

    <link rel="stylesheet"  href="/css/reset-password.css">
   

</head>

<body>

<div class="container">

    <div class="reset-card">

        <div class="logo">

            🔐

        </div>

        <h1>

            Reset Password

        </h1>

        <p>

            Enter your new password below.

        </p>

        <form id="resetForm">

            <div class="input-group">

                <label>

                    New Password

                </label>

                <input
                    type="password"
                    id="password"
                    required>

            </div>

            <div class="input-group">

                <label>

                    Confirm Password

                </label>

                <input
                    type="password"
                    id="confirmPassword"
                    required>

            </div>

            <button type="submit">

                🔒 Reset Password

            </button>

        </form>

        <div id="message"></div>

        <a href="/">

            ← Back to Login

        </a>

    </div>

</div>

<script src="/js/reset-password.js"></script>

</body>

</html>
