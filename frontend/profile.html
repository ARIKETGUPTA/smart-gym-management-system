<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile page</title>
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <div class="container">
    <div class="sidebar">
        <h2>🏋 Smart Gym</h2>
        <p id="today"></p>
        <ul>
           <li onclick="goToDashboard()">Dashboard</li>   
           <li onclick="goToAttendance()">Attendance</li>
           <li onclick="goToSubscription()"> Subscription </li>
           <li onclick="goToPayment()">Payments</li>
           <li onclick="goToProfile()">Profile</li>
            
            

            <li onclick="logout()">
                Logout
            </li>

        </ul>
    </div>
<div class="main">

    <div class="profile-hero">

        <h1>👤 My Profile</h1>

        <p>
            Manage your personal information and account settings
        </p>

    </div>

    <div class="profile-grid">

        <div class="profile-card">

        <div class="profile-avatar">

                <span id="avatarLetter">A</span>

        </div>

            <h2 id="profileName">
                Member
            </h2>

            <p id="profileEmail">
                member@email.com
            </p>

        </div>

        <div class="profile-details">

            <h2>Personal Information</h2>

            <div class="form-group">

                <label>Full Name</label>

                <input
                id="name"
                type="text">

            </div>

            <div class="form-group">

                <label>Email Address</label>

                <input
                id="email"
                type="email"
                disabled>

            </div>

            <button
            class="save-btn"
            onclick="updateProfile()">

                Save Changes

            </button>

        </div>

    </div>

    <div class="profile-stats">

        <div class="stat-card">

            <h3>🏋 Gym Member</h3>

            <p>Active User</p>

        </div>

        <div class="stat-card">

            <h3>📅 Attendance</h3>

            <p id="attendanceCount">
                --
            </p>

        </div>

        <div class="stat-card">

            <h3>💳 Subscription</h3>

            <p id="subscriptionPlan">
                --
            </p>

        </div>

    </div>

</div>
</div>
<script src="js/profile.js"></script>
</body>
</html>
